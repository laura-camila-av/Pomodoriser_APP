<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
</head>
<style>
    body {text-align: center}
     .input-group {
    background-color: rgb(201, 195, 195);
    padding: 10px;
    border-radius: 10px;
    margin: 10px;
    }
    

</style>

<body>
<h1><strong>Pomodoriser</strong> </h1>
<h2>Let's get some work done!</h2>
<!--Start of task input form-->

   <div style="background-color: white; padding-top: 5px; padding-bottom: 5px; padding-right:10px; padding-left:10px; border-radius: 10px;">
        <form action="/generate" method="post">
      
        <p id="form_text">How long, in number of pomodoro sessions would you like this plan to be?<br>Note that a Pomodoro sprint is 30 minutes long.</p>
        <div class="input-group">
            <label for="time_available">Plan Duration (Total Pomodoros): </label>
            <input type="number" id="time_available" name="time_available" min="0"><br>  
        </div>


        <input type="submit" value="Submit">

    </form>

   </div>
<a href="placeholder" target="_self"> How it works</a>

<!--End of task input form-->
<script>
const radios = document.querySelectorAll('input[name="taskTimeUnit"]');

const taskLabel = document.querySelector('label[for="task_time"]');

radios.forEach(radio => {
    radio.addEventListener('change', function() {
            const maxValue = calculateMax();

    if (!isNaN(maxValue)) {
        taskTime.max = maxValue;

        if (parseInt(taskTime.value) > maxValue) {
            taskTime.value = maxValue;
        }
    }
        taskLabel.textContent = "Task Duration ("+ this.value + "):";
    });
});

/*7. Set taskTime.max to maxValue
8. If the current value in taskTime exceeds the new max, cap it down to the max*/

const timeAvailable = document.getElementById("time_available");
const taskTime = document.getElementById("task_time");

function calculateMax() {
    planLength = parseInt(document.getElementById("time_available").value); //1

    const unitSelected = document.querySelector('input[name="taskTimeUnit"]:checked').value;
    if (!unitSelected) { return "No value selected."}
    if (unitSelected == "Pomodoro Sessions") { //is this how it works? or is there another step/format to extract the id of the radio input
        maxValue = planLength;
    }
    else if (unitSelected == "Hours") {
        maxValue = planLength / 2; 
    }
    else if (unitSelected == "Minutes") {
        maxValue = planLength / 25; 
    }
    return maxValue
}

timeAvailable.addEventListener("input", function() {
    const maxValue = calculateMax();

    if (!isNaN(maxValue)) {
        taskTime.max = maxValue;

        if (parseInt(taskTime.value) > maxValue) {
            taskTime.value = maxValue;
        }
    }
});


</script>

</body>

</html>
