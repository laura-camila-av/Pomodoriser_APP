    .form_text {
        color: rgb(7, 9, 115);

<body>
<h1><strong>Pomodoriser</strong> </h1>
<h2>Time to get some work done!</h2>
<!--Start of task input form-->

    
   <div style="background-color: white; padding-top: 5px; padding-bottom: 5px; padding-right:10px; padding-left:10px; border-radius: 10px;">
        <form action="/generate.php" method="post">
      
        <p id="form_text">Enter the time you have available to allocate to this plan.</p>
        <div class="input-group">
            <label for="time_available">Plan Duration: </label>
            <input type="number" id="time_available" name="time_available" min="0"><br>  
        </div>

        <p>Enter a brief description of your task (not exceeding 50 characters).</p>
        <div class="input-group">
            <label for="task_name">Task:</label>
            <input type="text" id="task_name" name="task_time"><br>
        </div>
         
         

        <p>Enter the time unit for your task duration estimate.</p>
        <div class="input-group">
            <input type="radio" id="pomodoro_units" name="taskTimeUnit" value="Pomodoro Sessions">
            <label for="pomodoro_units">Pomodoro Sessions</label><br>
            <input type="radio" id="hours" name="taskTimeUnit" value="Hours">
            <label for="hours">Hours</label><br>
            <input type="radio" id="minutes" name="taskTimeUnit" value="Minutes">
            <label for="minutes">Minutes</label><br>
        </div>
       
         <p>Enter the estimated duration of your task.</p>
         <div class="input-group">
            <label for="task_time">Task Duration:</label>
            <input type="number" id="task_time" name="task_time" min="0"><br>
         </div>

        <input type="submit" value="Submit">

    </form>

   </div>


   


<!--End of task input form-->

</body>





</html>
